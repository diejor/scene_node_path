name: Cross-Language Parity CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ci-parity-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: GdUnit4 Parity Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      actions: write
      checks: write
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# Solution
        run: dotnet build

      - name: Run GdUnit4 Tests
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: '4.6' 
          godot-net: true
          paths: |
            res://addons/scene_node_path/tests/
          timeout: 5
          report-name: parity_test_report.xml