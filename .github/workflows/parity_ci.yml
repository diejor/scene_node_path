name: GDUnit CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ci-parity-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: GdUnit4 Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      actions: write
      checks: write
      contents: read
      pull-requests: write
      statuses: write

    strategy:
      fail-fast: false
      matrix:
        godot-version: ['4.0', '4.1', '4.2', '4.3', '4.4', '4.5', '4.6']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C# Solution
        run: dotnet build

      - name: Run GdUnit4 Tests
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: ${{ matrix.godot-version }}
          godot-net: true
          paths: |
            res://addons/scene_node_path/tests/
          timeout: 5
          report-name: test_report.xml